# Labels and acknowledges feedback submitted from the widget.
name: Feedback

on:
  issues:
    types: [opened]

jobs:
  acknowledge:
    if: contains(github.event.issue.body, 'smartgraph-feedback-widget')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Label and acknowledge
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUM: ${{ github.event.issue.number }}
        run: |
          gh label create "mockup-feedback" --repo "$REPO" --color "3F8A7C" \
            --description "Filed via the on-page feedback widget" --force
          gh issue edit "$NUM" --repo "$REPO" --add-label "mockup-feedback"
          gh issue comment "$NUM" --repo "$REPO" --body "✅ **Feedback received.** Your issue has been labeled \`mockup-feedback\`."
