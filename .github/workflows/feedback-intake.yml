# Feedback Intake (no API key required)
# --------------------------------------
# Proves the automation loop: when a visitor files feedback through the
# on-page widget, this labels the issue and posts an acknowledgment —
# using only the built-in GITHUB_TOKEN.
#
# Phase 2 (AI auto-fix): move the two files from .github/workflows-parked/
# into .github/workflows/ and add the ANTHROPIC_API_KEY secret.
# See FEEDBACK-SETUP.md.

name: Feedback Intake

on:
  issues:
    types: [opened]

jobs:
  acknowledge:
    if: contains(github.event.issue.body, 'smartgraph-feedback-widget')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Label and acknowledge
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUM: ${{ github.event.issue.number }}
        run: |
          gh label create "mockup-feedback" --repo "$REPO" --color "3F8A7C" \
            --description "Filed via the on-page feedback widget" --force
          gh issue edit "$NUM" --repo "$REPO" --add-label "mockup-feedback"
          gh issue comment "$NUM" --repo "$REPO" --body "✅ **Feedback received.** Filed automatically from the mockup page and labeled \`mockup-feedback\`. AI auto-fix activates in phase 2 — see \`FEEDBACK-SETUP.md\`."
