<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>USS Blue Sky Pages</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #e7e5df;
      color: #2c2823;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page-shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100%;
    }

    .page-nav {
      align-items: center;
      background: rgba(239, 235, 227, 0.94);
      border-bottom: 1px solid rgba(44, 40, 35, 0.12);
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .page-nav__title {
      font-weight: 700;
      margin-right: auto;
    }

    .page-nav a {
      border-radius: 999px;
      color: inherit;
      padding: 0.45rem 0.8rem;
      text-decoration: none;
    }

    .page-nav a[aria-current="page"] {
      background: #3f8a7c;
      color: #fff;
    }

    #page-frame {
      border: 0;
      display: block;
      height: 100%;
      min-height: calc(100vh - 54px);
      width: 100%;
    }

    .not-found {
      display: grid;
      min-height: calc(100vh - 54px);
      place-items: center;
      text-align: center;
    }

    .not-found__card {
      background: rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(44, 40, 35, 0.12);
      max-width: 520px;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav class="page-nav" aria-label="ページ一覧">
      <span class="page-nav__title">USS Blue Sky</span>
      <a href="/page/chat" data-route="/page/chat">Chat</a>
      <a href="/page/history" data-route="/page/history">History</a>
    </nav>
    <main id="app"></main>
  </div>

  <script>
    const routes = {
      '/page/chat': '/pages/ChatPage.html',
      '/page/history': '/pages/HistoryPage.html',
    };

    const app = document.getElementById('app');
    const navLinks = Array.from(document.querySelectorAll('[data-route]'));

    function normalizePath(pathname) {
      return pathname.replace(/\/$/, '') || '/page/chat';
    }

    function setActiveLink(pathname) {
      navLinks.forEach((link) => {
        const isActive = link.dataset.route === pathname;
        link.toggleAttribute('aria-current', isActive);
        if (isActive) {
          link.setAttribute('aria-current', 'page');
        }
      });
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value;
      return div.innerHTML;
    }

    function renderNotFound(pathname) {
      const safePathname = escapeHtml(pathname);
      app.innerHTML = `
        <section class="not-found">
          <div class="not-found__card">
            <h1>Page not found</h1>
            <p><code>${safePathname}</code> に対応するページが見つかりません。</p>
            <p><a href="/page/chat" data-fallback-link>Chat ページへ移動</a></p>
          </div>
        </section>
      `;
      const fallbackLink = app.querySelector('[data-fallback-link]');
      fallbackLink.addEventListener('click', handleNavigation);
    }

    function renderRoute(pathname) {
      const normalizedPath = normalizePath(pathname);
      const pageSource = routes[normalizedPath];
      setActiveLink(normalizedPath);

      if (!pageSource) {
        renderNotFound(normalizedPath);
        return;
      }

      app.innerHTML = '';
      const frame = document.createElement('iframe');
      frame.id = 'page-frame';
      frame.title = `${normalizedPath} page`;
      frame.src = pageSource;
      app.appendChild(frame);
    }

    function handleNavigation(event) {
      const link = event.currentTarget;
      const href = link.getAttribute('href');
      if (!href || !href.startsWith('/')) {
        return;
      }

      event.preventDefault();
      window.history.pushState({}, '', href);
      renderRoute(window.location.pathname);
    }

    navLinks.forEach((link) => link.addEventListener('click', handleNavigation));
    window.addEventListener('popstate', () => renderRoute(window.location.pathname));

    if (window.location.pathname === '/') {
      window.history.replaceState({}, '', '/page/chat');
    }
    renderRoute(window.location.pathname);
  </script>
</body>
</html>
