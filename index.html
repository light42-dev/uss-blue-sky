<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>USS Project Pages</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #e7e5df;
      color: #2c2823;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page-shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100%;
    }

    .page-nav {
      align-items: center;
      background: rgba(239, 235, 227, 0.94);
      border-bottom: 1px solid rgba(44, 40, 35, 0.12);
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .page-nav__title {
      font-weight: 700;
      margin-right: auto;
    }

    .page-nav a {
      border-radius: 999px;
      color: inherit;
      padding: 0.45rem 0.8rem;
      text-decoration: none;
    }

    .page-nav a[aria-current="page"] {
      background: #3f8a7c;
      color: #fff;
    }

    #page-frame {
      border: 0;
      display: block;
      height: 100%;
      min-height: calc(100vh - 54px);
      width: 100%;
    }

    .not-found {
      display: grid;
      min-height: calc(100vh - 54px);
      place-items: center;
      text-align: center;
    }

    .not-found__card {
      background: rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(44, 40, 35, 0.12);
      max-width: 520px;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav class="page-nav" aria-label="ページ一覧">
      <span class="page-nav__title">USS Project</span>
      <a href="#chat" data-route="chat">Chat</a>
      <a href="#history" data-route="history">History</a>
    </nav>
    <main id="app"></main>
  </div>

  <script>
    const defaultRoute = 'chat';
    const routes = {
      chat: 'pages/ChatPage.html',
      history: 'pages/HistoryPage.html',
    };

    const app = document.getElementById('app');
    const navLinks = Array.from(document.querySelectorAll('[data-route]'));

    function normalizeRoute(hash) {
      return hash.replace(/^#\/?/, '').replace(/\/$/, '') || defaultRoute;
    }

    function setActiveLink(route) {
      navLinks.forEach((link) => {
        const isActive = link.dataset.route === route;
        link.toggleAttribute('aria-current', isActive);
        if (isActive) {
          link.setAttribute('aria-current', 'page');
        }
      });
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value;
      return div.innerHTML;
    }

    function renderNotFound(route) {
      const safeRoute = escapeHtml(route);
      app.innerHTML = `
        <section class="not-found">
          <div class="not-found__card">
            <h1>Page not found</h1>
            <p><code>#${safeRoute}</code> に対応するページが見つかりません。</p>
            <p><a href="#${defaultRoute}" data-fallback-link>Chat ページへ移動</a></p>
          </div>
        </section>
      `;
    }

    function renderRoute() {
      const route = normalizeRoute(window.location.hash);
      const pageSource = routes[route];
      setActiveLink(route);

      if (!pageSource) {
        renderNotFound(route);
        return;
      }

      app.innerHTML = '';
      const frame = document.createElement('iframe');
      frame.id = 'page-frame';
      frame.title = `${route} page`;
      frame.src = pageSource;
      app.appendChild(frame);
    }

    if (!window.location.hash) {
      window.location.replace(`${window.location.pathname}${window.location.search}#${defaultRoute}`);
    } else {
      renderRoute();
    }

    window.addEventListener('hashchange', renderRoute);
  </script>
</body>
</html>
